<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo azul arredondado -->
  <rect width="512" height="512" rx="96" fill="#2563EB"/>

  <!-- Grid de Sudoku 3x3 (linhas externas e internas) -->
  <!-- Quadrante superior esquerdo: alguns números brancos -->
  <!-- Linhas do grid -->
  <g stroke="white" stroke-linecap="round">
    <!-- Borda externa -->
    <rect x="80" y="80" width="352" height="352" rx="8" fill="none" stroke-width="14"/>
    <!-- Divisores internos do 3x3 (grossos) -->
    <line x1="197" y1="80"  x2="197" y2="432" stroke-width="10"/>
    <line x1="315" y1="80"  x2="315" y2="432" stroke-width="10"/>
    <line x1="80"  y1="197" x2="432" y2="197" stroke-width="10"/>
    <line x1="80"  y1="315" x2="432" y2="315" stroke-width="10"/>
    <!-- Subdivisores finos 1/3 -->
    <line x1="119" y1="80"  x2="119" y2="432" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="158" y1="80"  x2="158" y2="432" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="236" y1="80"  x2="236" y2="432" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="275" y1="80"  x2="275" y2="432" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="354" y1="80"  x2="354" y2="432" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="393" y1="80"  x2="393" y2="432" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="80"  y1="119" x2="432" y2="119" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="80"  y1="158" x2="432" y2="158" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="80"  y1="236" x2="432" y2="236" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="80"  y1="275" x2="432" y2="275" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="80"  y1="354" x2="432" y2="354" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="80"  y1="393" x2="432" y2="393" stroke-width="3" stroke-opacity="0.5"/>
  </g>

  <!-- Alguns números em destaque para dar vida ao ícone -->
  <g fill="white" font-family="Arial,sans-serif" font-weight="bold" text-anchor="middle" dominant-baseline="central">
    <text x="99"  y="99"  font-size="28">5</text>
    <text x="256" y="138" font-size="28">3</text>
    <text x="374" y="99"  font-size="28">7</text>
    <text x="138" y="256" font-size="28">9</text>
    <text x="256" y="256" font-size="34" fill="#93C5FD">6</text>
    <text x="374" y="256" font-size="28">1</text>
    <text x="99"  y="374" font-size="28">2</text>
    <text x="256" y="374" font-size="28">8</text>
    <text x="374" y="413" font-size="28">4</text>
  </g>
</svg>
